version: '3.8'

services:
  razum-miner:
    build: .
    # Or use pre-built: image: therazum/miner:latest
    container_name: razum-miner
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - NODE_NAME=${NODE_NAME:-razum-node}
      - MAX_CONCURRENT_TASKS=${MAX_CONCURRENT_TASKS:-3}
      - MODELS=${MODELS:-deepseek-r1:14b}
      - COORDINATOR_URL=${COORDINATOR_URL:-https://airazum.com}
      - POLL_INTERVAL=${POLL_INTERVAL:-5000}
      - MIN_REWARD=${MIN_REWARD:-0.05}
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ollama-data:
