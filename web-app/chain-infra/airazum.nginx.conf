server {
    server_name airazum.com www.airazum.com;
    location / {
        proxy_pass http://127.0.0.1:18003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/airazum.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/airazum.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # razum-testnet-1 RPC (CometBFT JSON-RPC)
    location /chain-rpc/ {
        proxy_pass http://127.0.0.1:26657/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;
        if ($request_method = 'OPTIONS') { return 204; }
    }

    # razum-testnet-1 Cosmos REST API
    location /chain-api/ {
        proxy_pass http://127.0.0.1:1317/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;
        if ($request_method = 'OPTIONS') { return 204; }
    }
}

server {
    if ($host = www.airazum.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = airazum.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name airazum.com www.airazum.com;
    return 404; # managed by Certbot
}
