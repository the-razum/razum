name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'web-app/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Install dependencies
        working-directory: web-app
        run: npm ci

      - name: Build
        working-directory: web-app
        run: npm run build
        env:
          AUTH_SECRET: test-secret-for-build
          NEXT_PUBLIC_URL: https://airazum.com

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/razum-web/web-app
            git pull origin main
            npm ci --omit=dev
            npm run build
            pm2 restart razum-web --update-env
            echo 'Deployed at' $(date)
